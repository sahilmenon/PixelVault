name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.

  - type: checkboxes
    id: area
    attributes:
      label: Area
      options:
        - label: Encoder
        - label: Decoder
        - label: ECC / error correction
        - label: YouTube upload/download
        - label: CLI / UX
        - label: Performance
        - label: Documentation
        - label: Other
